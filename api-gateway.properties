# AUTH SERVICE
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/gateway/auth/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/gateway/auth/(?<segment>.*), /${segment}

# DELIVERY
spring.cloud.gateway.routes[1].id=delivery-service
spring.cloud.gateway.routes[1].uri=lb://delivery-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/gateway/deliveries/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/gateway/deliveries/(?<segment>.*), /${segment}

# TRACKING
spring.cloud.gateway.routes[2].id=tracking-service
spring.cloud.gateway.routes[2].uri=lb://tracking-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/gateway/tracking/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/gateway/tracking/(?<segment>.*), /${segment}

# ADMIN
spring.cloud.gateway.routes[3].id=admin-service
